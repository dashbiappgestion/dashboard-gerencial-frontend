@if (chart(); as c) {
<svg class="scatter-svg scatter-plot" viewBox="0 0 640 300">
  <defs>
    <linearGradient id="scatterBand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1a17" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#1c1a17" stop-opacity="0.02" />
    </linearGradient>
  </defs>

  <line class="axis-line" [attr.x1]="axisLeftX" [attr.y1]="axisBottomY" [attr.x2]="axisRightX"
    [attr.y2]="axisBottomY" />
  <line class="axis-line" [attr.x1]="axisLeftX" [attr.y1]="axisTopY" [attr.x2]="axisLeftX" [attr.y2]="axisBottomY" />

  @for (tick of c.yTicks; track tick.val) {
  <line class="grid-line" [attr.x1]="axisLeftX" [attr.y1]="tick.pos" [attr.x2]="axisRightX" [attr.y2]="tick.pos" />
  <text class="y-tick-label" [attr.x]="axisLeftX - 8" [attr.y]="tick.pos + 3" text-anchor="end">{{ tick.val }}</text>
  }

  @for (tick of c.xTicks; track tick.val) {
  <text class="axis-label" [attr.x]="tick.pos" [attr.y]="axisBottomY + 16" text-anchor="middle">{{ tick.val }}</text>
  }

  <text class="axis-title" [attr.x]="axisTitleX" y="296" text-anchor="middle">
    Horas de capacitación / empleado
  </text>
  <text class="axis-title" x="16" y="16" text-anchor="start">Tasa de errores %</text>
  <line class="meta-line" [attr.x1]="c.metaX" [attr.y1]="axisTopY" [attr.x2]="c.metaX" [attr.y2]="axisBottomY"
    stroke="var(--gray-500)" stroke-width="1.2" stroke-dasharray="4 4" />
  <text class="meta-label" [attr.x]="c.metaX + 5" y="30" fill="var(--gray-600)">Meta {{ modalData().meta }}h</text>

  @if (c.bandD) {
  <path [attr.d]="c.bandD" fill="url(#scatterBand)" />
  }

  @if (c.regLine) {
  <path [attr.d]="c.regLine" fill="none" stroke="var(--gray-600)" stroke-width="2" stroke-dasharray="6 4" />
  }

  @for (pt of c.points; track pt.anio + '-' + pt.mes + '-' + pt.nombre_region) {
  <g class="scatter-pt" [attr.data-status]="pt.outlier ? 'red' : 'green'" style="opacity: 1; transform: scale(1)"
    (mouseenter)="onEnter($event, pt)" (mouseleave)="onLeave()">
    <circle class="dot" [attr.cx]="pt.cx" [attr.cy]="pt.cy" [attr.r]="2" fill="var(--status)" stroke="var(--ink)"
      stroke-opacity="0.25" stroke-width="1" />
    <circle class="hit" [attr.cx]="pt.cx" [attr.cy]="pt.cy" r="2" />
  </g>
  }
</svg>
<p class="modal-stats-line">
  Coeficiente r de Pearson: <strong>{{ c.r ?? '-' }}</strong>
  · Puntos atípicos marcados en rojo (residuales de la regresión)
</p>
}
