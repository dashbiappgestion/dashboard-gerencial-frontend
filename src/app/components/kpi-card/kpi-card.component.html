<article
  class="kpi-card"
  [attr.data-status]="card().status"
  [style.filter]="blurred() ? 'blur(' + blurPx() + 'px)' : 'none'"
  tabindex="0"
  (click)="cardClick.emit()"
  (keydown.enter)="cardClick.emit()"
>
  <div class="kpi-top">
    <p class="kpi-label">{{ card().label }}</p>
    <span class="led" aria-hidden="true"></span>
  </div>
  <p class="kpi-value"><span class="num">{{ displayValue() }}</span></p>
  <div class="kpi-bar-track">
    <div class="kpi-bar-fill" [style.width.%]="barPct()"></div>
  </div>
  <p class="kpi-meta">
    Meta: <strong>{{ formatMeta(card()) }}</strong>
    <span class="kpi-pct">{{ fmt(card().pct, 1) }}%</span>
  </p>
</article>
