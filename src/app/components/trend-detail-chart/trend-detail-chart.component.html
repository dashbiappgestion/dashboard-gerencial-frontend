@if (chart(); as c) {
  <svg class="line-svg" viewBox="0 0 640 280">
    <defs>
      <linearGradient id="bandGradient" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1c1a17" stop-opacity="0.12" />
        <stop offset="100%" stop-color="#1c1a17" stop-opacity="0.04" />
      </linearGradient>
    </defs>

    <line class="axis-line" [attr.x1]="48" [attr.y1]="axisBottomY" [attr.x2]="axisRightX" [attr.y2]="axisBottomY" />
    <line class="axis-line" [attr.x1]="48" [attr.y1]="24" [attr.x2]="48" [attr.y2]="axisBottomY" />

    @if (c.bandD) {
      <path [attr.d]="c.bandD" fill="url(#bandGradient)" />
    }

    @for (ref of c.refLines; track ref.key) {
      <line
        class="meta-line"
        [attr.x1]="48"
        [attr.y1]="ref.y"
        [attr.x2]="axisRightX"
        [attr.y2]="ref.y"
      />
      <text class="meta-label" [attr.x]="axisRightX" [attr.y]="ref.y - 5" text-anchor="end">
        {{ ref.label }} {{ ref.val }}
      </text>
    }

    @if (c.trendLineD) {
      <path [attr.d]="c.trendLineD" fill="none" stroke="var(--gray-500)" stroke-width="1.5" stroke-dasharray="5 4" />
    }

    <path class="line-path" [attr.d]="c.lineD" style="stroke-dashoffset: 0" />

    @for (pt of c.pts; track pt.label) {
      <g
        class="marker"
        [attr.data-status]="pt.outlier ? 'red' : null"
        style="opacity: 1; transform: scale(1)"
        (mouseenter)="onEnter($event, pt)"
        (mouseleave)="onLeave()"
      >
        <circle
          class="ring"
          [attr.cx]="pt.cx"
          [attr.cy]="pt.cy"
          r="5"
          [attr.stroke]="pt.outlier ? 'var(--c-red)' : 'var(--gray-700)'"
        />
        <circle class="hit" [attr.cx]="pt.cx" [attr.cy]="pt.cy" r="12" />
      </g>
    }

    @for (pt of c.pts; track pt.label + '-lbl') {
      <text class="month-label" [attr.x]="pt.cx" [attr.y]="axisBottomY + 16" text-anchor="middle">
        {{ pt.label }}
      </text>
    }
  </svg>
}
