@if (chart(); as c) {
  <svg class="line-svg" [attr.viewBox]="'0 0 ' + viewW() + ' ' + viewH()">
    <defs>
      <linearGradient id="bandGradient" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1c1a17" stop-opacity="0.12" />
        <stop offset="100%" stop-color="#1c1a17" stop-opacity="0.04" />
      </linearGradient>
    </defs>

    <line class="axis-line" [attr.x1]="axisLeftX" [attr.y1]="axisBottomY()" [attr.x2]="axisRightX()" [attr.y2]="axisBottomY()" />
    <line class="axis-line" [attr.x1]="axisLeftX" [attr.y1]="axisTopY" [attr.x2]="axisLeftX" [attr.y2]="axisBottomY()" />

    @for (tick of c.yTicks; track tick.val) {
      <line class="grid-line" [attr.x1]="axisLeftX" [attr.y1]="tick.y" [attr.x2]="axisRightX()" [attr.y2]="tick.y" />
      <text class="y-tick-label" [attr.x]="axisLeftX - 8" [attr.y]="tick.y + 3" text-anchor="end">{{ tick.val }}</text>
    }

    @if (c.bandD) {
      <path [attr.d]="c.bandD" fill="url(#bandGradient)" />
    }

    @if (c.iqrBox; as box) {
      @if (box.yMin != null) {
        <line
          [attr.x1]="box.x + box.width * 0.3"
          [attr.y1]="box.yMin"
          [attr.x2]="box.x + box.width * 0.7"
          [attr.y2]="box.yMin"
          stroke="var(--gray-500)" stroke-width="1.5" stroke-linecap="round"
        />
        <line
          [attr.x1]="box.x + box.width * 0.5"
          [attr.y1]="box.yMin"
          [attr.x2]="box.x + box.width * 0.5"
          [attr.y2]="box.yQ1"
          stroke="var(--gray-500)" stroke-width="1" stroke-dasharray="3 3"
        />
        @if (box.labelMin != null) {
          <text class="meta-label" [attr.x]="box.x + 2" [attr.y]="box.yMin - 4" text-anchor="start">Mín {{ box.labelMin }}</text>
        }
      }

      <rect
        [attr.x]="box.x"
        [attr.y]="box.y"
        [attr.width]="box.width"
        [attr.height]="box.height"
        fill="var(--gray-300)" fill-opacity="0.25"
        stroke="var(--gray-500)" stroke-width="1"
        rx="3"
      />

      <text class="meta-label" [attr.x]="axisRightX()" [attr.y]="box.yQ3 - 4" text-anchor="end">Q3 {{ box.labelQ3 }}</text>
      <text class="meta-label" [attr.x]="axisRightX()" [attr.y]="box.yQ1 + 12" text-anchor="end">Q1 {{ box.labelQ1 }}</text>

      @if (box.yMax != null) {
        <line
          [attr.x1]="box.x + box.width * 0.5"
          [attr.y1]="box.yQ3"
          [attr.x2]="box.x + box.width * 0.5"
          [attr.y2]="box.yMax"
          stroke="var(--gray-500)" stroke-width="1" stroke-dasharray="3 3"
        />
        <line
          [attr.x1]="box.x + box.width * 0.3"
          [attr.y1]="box.yMax"
          [attr.x2]="box.x + box.width * 0.7"
          [attr.y2]="box.yMax"
          stroke="var(--gray-500)" stroke-width="1.5" stroke-linecap="round"
        />
        @if (box.labelMax != null) {
          <text class="meta-label" [attr.x]="box.x + 2" [attr.y]="box.yMax - 4" text-anchor="start">Máx {{ box.labelMax }}</text>
        }
      }
    }

    @if (c.medianY != null) {
      <line
        [attr.x1]="axisLeftX"
        [attr.y1]="c.medianY"
        [attr.x2]="axisRightX()"
        [attr.y2]="c.medianY"
        stroke="var(--gray-700)" stroke-width="2" stroke-dasharray="6 4"
      />
      <text class="meta-label" [attr.x]="axisRightX()" [attr.y]="c.medianY - 5" text-anchor="end">Mediana</text>
    }

    <line
      class="meta-line"
      [attr.x1]="axisLeftX"
      [attr.y1]="c.metaRef.y"
      [attr.x2]="axisRightX()"
      [attr.y2]="c.metaRef.y"
    />
    <text class="meta-label" [attr.x]="axisRightX()" [attr.y]="c.metaRef.y - 5" text-anchor="end">
      Meta {{ c.metaRef.val }}
    </text>

    @if (c.trendLineD) {
      <path [attr.d]="c.trendLineD" fill="none" stroke="var(--gray-500)" stroke-width="1.5" stroke-dasharray="5 4" />
    }

    <path class="line-path" [attr.d]="c.lineD" style="stroke-dashoffset: 0" />

    @if (chart()?.forecastData; as fd) {
      <path class="forecast-band" [attr.d]="fd.bandD" />
      <path class="forecast-line" [attr.d]="fd.lineD" />
      <circle
        class="forecast-point"
        [attr.cx]="fd.cx"
        [attr.cy]="fd.cy"
        (mouseenter)="onForecastEnter($event, fd)"
        (mouseleave)="onLeave()"
      />
    }

    @for (pt of chart()?.pts; track pt.label) {
      <g
        class="marker"
        [attr.data-status]="pt.outlier ? 'red' : null"
        style="opacity: 1; transform: scale(1)"
        (mouseenter)="onEnter($event, pt)"
        (mouseleave)="onLeave()"
      >
        <circle
          class="ring"
          [attr.cx]="pt.cx"
          [attr.cy]="pt.cy"
          r="5"
          [attr.stroke]="pt.outlier ? 'var(--c-red)' : 'var(--gray-700)'"
          [attr.fill]="pt.outlier ? 'var(--c-red)' : 'var(--bg)'"
          [attr.fill-opacity]="pt.outlier ? 0.25 : 1"
        />
        <circle class="hit" [attr.cx]="pt.cx" [attr.cy]="pt.cy" r="12" />
      </g>
    }

    @for (lbl of chart()?.labels; track lbl.label) {
      <text
        class="axis-label"
        [attr.x]="lbl.x"
        [attr.y]="axisBottomY() + 8"
        [attr.text-anchor]="rotarEtiquetas() ? 'end' : 'middle'"
        [attr.transform]="rotarEtiquetas() ? ('rotate(-90 ' + lbl.x + ' ' + (axisBottomY() + 8) + ')') : null"
      >{{ lbl.label }}</text>
    }
  </svg>
}
