<svg class="scatter-svg scatter-plot" viewBox="0 0 480 300">
  <line class="axis-line" [attr.x1]="48" [attr.y1]="axisBottomY" [attr.x2]="axisRightX" [attr.y2]="axisBottomY" />
  <line class="axis-line" [attr.x1]="48" [attr.y1]="16" [attr.x2]="48" [attr.y2]="axisBottomY" />

  @for (tick of axisTicks().yTicks; track tick.val) {
    <line class="grid-line" [attr.x1]="48" [attr.y1]="tick.pos" [attr.x2]="axisRightX" [attr.y2]="tick.pos" />
    <text class="y-tick-label" x="44" [attr.y]="tick.pos + 3" text-anchor="end">{{ tick.val }}</text>
  }

  @for (tick of axisTicks().xTicks; track tick.val) {
    <text class="axis-label" [attr.x]="tick.pos" [attr.y]="axisBottomY + 12" text-anchor="middle">{{ tick.val }}</text>
  }

  <text class="axis-title" [attr.x]="axisTitleX" y="296" text-anchor="middle">
    Horas de capacitación / empleado
  </text>
  <text class="axis-title" x="14" y="14" text-anchor="start">Tasa de errores %</text>
  <line class="meta-line" [attr.x1]="guideMetaX()" [attr.y1]="16" [attr.x2]="guideMetaX()" [attr.y2]="axisBottomY" stroke="var(--gray-500)" stroke-width="1.2" stroke-dasharray="4 4" />
  <text class="meta-label" [attr.x]="guideMetaX() + 4" y="26" fill="var(--gray-600)">Meta {{ meta_horas() }}h</text>

  @if (forecastPlot(); as fd) {
    <line [attr.x1]="fd.xInf" [attr.y1]="fd.cy" [attr.x2]="fd.xSup" [attr.y2]="fd.cy" class="forecast-line" />
    <line [attr.x1]="fd.cx" [attr.y1]="fd.yInf" [attr.x2]="fd.cx" [attr.y2]="fd.ySup" class="forecast-line" />
    <path [attr.d]="'M ' + fd.cx + ' ' + (fd.cy - 6) + ' L ' + (fd.cx + 6) + ' ' + fd.cy + ' L ' + fd.cx + ' ' + (fd.cy + 6) + ' L ' + (fd.cx - 6) + ' ' + fd.cy + ' Z'"
          class="forecast-point"
          (mouseenter)="onForecastEnter($event, fd)"
          (mouseleave)="onLeave()" />
  }

  @for (pt of plotPoints(); track pt.anio + '-' + pt.mes + '-' + pt.nombre_region) {
    <g
      class="scatter-pt"
      [attr.data-status]="pt.status"
      [style.animation-delay]="pt.delay"
      (mouseenter)="onEnter($event, pt)"
      (mouseleave)="onLeave()"
    >
      <circle class="dot" [attr.cx]="pt.cx" [attr.cy]="pt.cy" r="3" fill="var(--status)" stroke="var(--ink)" stroke-opacity="0.25" stroke-width="1" />
      <circle class="hit" [attr.cx]="pt.cx" [attr.cy]="pt.cy" r="3" />
    </g>
  }
</svg>
