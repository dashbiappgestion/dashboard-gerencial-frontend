<div class="yrs-wrap">

  <div class="yrs-header">
    <span class="yrs-label">Período</span>
    <span class="yrs-range-text">
      {{ fromYear() }}
      @if (fromYear() !== toYear()) { <span class="yrs-dash">–</span> {{ toYear() }} }
    </span>
    <button class="yrs-reset" (click)="resetRange()" title="Ver todo">Todo</button>
  </div>

  <div class="yrs-body">
    <div class="yrs-track" #track>
      <div
        class="yrs-fill"
        [style.left.%]="fillLeft"
        [style.width.%]="fillWidth"
      ></div>

      <div
        class="yrs-handle"
        [style.left.%]="fromLeftPct"
        (mousedown)="startDrag('from', $event)"
        (touchstart)="startDrag('from', $event)"
        title="{{ fromYear() }}"
      ><div class="yrs-grip"></div></div>

      <div
        class="yrs-handle"
        [style.left.%]="toLeftPct"
        (mousedown)="startDrag('to', $event)"
        (touchstart)="startDrag('to', $event)"
        title="{{ toYear() }}"
      ><div class="yrs-grip"></div></div>
    </div>

    <div class="yrs-ticks">
      @for (year of years; track year) {
        <div
          class="yrs-tick"
          [class.yrs-tick--active]="year >= fromYear() && year <= toYear()"
          (click)="selectYear(year)"
        >
          <span class="yrs-tick-lbl">{{ year }}</span>
        </div>
      }
    </div>
  </div>

</div>
